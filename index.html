<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #121212;
            }
            #paper {
                height: 100vh;
                width: 100vw;
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="paper"></canvas>

        <script>
            const paper = document.querySelector("#paper");
            const pen = paper.getContext("2d");

            let soundEnabled = true;

            let popupText = "";
            let popupStartTime = 0;

            paper.onclick = () => {
                soundEnabled = !soundEnabled;
                popupText = soundEnabled ? "Sound enabled" : "Sound disabled";
                popupStartTime = new Date().getTime();
            };
            
            let startTime = new Date().getTime();
            
            const duration = 500;
            const maxLoops = 50;
            const oneFullLoop = 2 * Math.PI;
            const circleRadius = 5;

            const calculateNextImpactTime = (currentImpactTime, velocity) => {
                return currentImpactTime + (Math.PI / velocity) * 1000;
            };

            const arcs = [
                "#D0E7F5", "#D9E7F4", "#D6E3F4", "#BCDFF5", "#B7D9F4", 
                "#C3D4F0", "#9DC1F3", "#9AA9F4", "#8D83EF", "#AE69F0", 
                "#D46FF1", "#DB5AE7", "#D911DA", "#D601CB", "#E713BF", 
                "#F24CAE", "#FB79AB", "#FFB6C1", "#FED2CF", "#FDDFD5", "#FEDCD1"
            ].map((color, index) => {
                const audio = new Audio(`sounds/key-${index}.wav`);
                const numberOfLoops = oneFullLoop * (maxLoops - index);
                const velocity = numberOfLoops / duration;

                audio.volume = 0.5;

                return {            
                    color,
                    audio,
                    velocity,
                    nextImpactTime: calculateNextImpactTime(startTime, velocity)
                }
            });

            const draw = () => {
                const currentTime = new Date().getTime()
                const elapsedTime = (currentTime - startTime) / 1000;

                paper.width = paper.clientWidth;
                paper.height = paper.clientHeight;

                const start = {
                    x: paper.width * 0.1,
                    y: paper.height * 0.9
                }

                const end = {
                    x: paper.width * 0.9,
                    y: paper.height * 0.9
                }

                pen.strokeStyle = "white";
                pen.lineWidth = 3;
                pen.beginPath();
                pen.moveTo(start.x, start.y);
                pen.lineTo(end.x, end.y);
                pen.stroke();

                const center = {
                    x: paper.width * 0.5,
                    y: paper.height * 0.9
                };

                const length = end.x - start.x;
                const initialArcRadius = length * 0.05;
                const spacing = (length / 2 - initialArcRadius) / arcs.length;

                arcs.forEach((arc, index) => {
                    const arcRadius = initialArcRadius + (index * spacing);

                    // Draw arc (the semi-circle path)
                    pen.beginPath();
                    pen.strokeStyle = arc.color;
                    pen.lineWidth = 2;
                    pen.arc(center.x, center.y, arcRadius, Math.PI, 2 * Math.PI);
                    pen.stroke();

                    const distance = Math.PI + (elapsedTime * arc.velocity);
                    const maxAngle = 2 * Math.PI;
                    const modDistance = distance % maxAngle;
                    
                    const adjustedDistance = modDistance >= Math.PI ? modDistance : maxAngle - modDistance;

                    const x = center.x + arcRadius * Math.cos(adjustedDistance);
                    const y = center.y + arcRadius * Math.sin(adjustedDistance);

                    // Draw circle (the moving dot)
                    pen.beginPath();
                    pen.fillStyle = "white";
                    pen.arc(x, y, circleRadius, 0, 2 * Math.PI);
                    pen.fill();

                    if(currentTime >= arc.nextImpactTime) {
                        if(soundEnabled) {
                            arc.audio.currentTime = 0;
                            arc.audio.play().catch(() => {});
                        }
                        arc.nextImpactTime = calculateNextImpactTime(arc.nextImpactTime, arc.velocity);
                    }
                });

                if (popupStartTime > 0) {
                    const timeSincePopup = (currentTime - popupStartTime) / 1000;
                    
                    if (timeSincePopup <= 1.0) {
                        let opacity = 0.5;
                        
                        if (timeSincePopup > 0.5) {
                            opacity = 1.0 - timeSincePopup; 
                        }
                        
                        pen.save();
                        pen.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                        pen.font = "bold 48px sans-serif";
                        pen.textAlign = "center";
                        pen.textBaseline = "middle";
                        pen.fillText(popupText, paper.width / 2, paper.height / 2);
                        pen.restore();
                    }
                }

                requestAnimationFrame(draw);
            }

            draw();
        </script>
    </body>
</html>
